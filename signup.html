              <path d="M16 0C7.2 0 0 7.2 0 16s7.2 16 16 16l37.9 0c7.6 0 14.2 5.3 15.7 12.8l58.9 288c6.1 29.8 32.3 51.2 62.7 51.2L496 384c8.8 0 16-7.2 16-16s-7.2-16-16-16l-304.8 0c-15.2 0-28.3-10.7-31.4-25.6L152 288l314.6 0c29.4 0 55-20 62.1-48.5L570.6 71.8c5-20.2-10.2-39.8-31-39.8L99.1 32C92.5 13 74.4 0 53.9 0L16 0zm90.1 64l433.4 0L497.6 231.8C494 246 481.2 256 466.5 256l-321.1 0L106.1 64zM168 456a24 24 0 1 1 48 0 24 24 0 1 1 -48 0zm80 0a56 56 0 1 0 -112 0 56 56 0 1 0 112 0zm200-24a24 24 0 1 1 0 48 24 24 0 1 1 0-48zm0 80a56 56 0 1 0 0-112 56 56 0 1 0 0 112z"/>

      <div class="signup-panel">
        <div class="profile-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><!--!Font Awesome Free 6.7.2 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2025 Fonticons, Inc.--><path d="M406.5 399.6C387.4 352.9 341.5 320 288 320l-64 0c-53.5 0-99.4 32.9-118.5 79.6C69.9 362.2 48 311.7 48 256C48 141.1 141.1 48 256 48s208 93.1 208 208c0 55.7-21.9 106.2-57.5 143.6zm-40.1 32.7C334.4 452.4 296.6 464 256 464s-78.4-11.6-110.5-31.7c7.3-36.7 39.7-64.3 78.5-64.3l64 0c38.8 0 71.2 27.6 78.5 64.3zM256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zm0-272a40 40 0 1 1 0-80 40 40 0 1 1 0 80zm-88-40a88 88 0 1 0 176 0 88 88 0 1 0 -176 0z"/></svg>
        </div>

        <form class="signup-form">
          <div class="rotate-element"><a href="javascript:history.back()"> &lt; </a></div>
          <div class="form-group">
            <label for="first-name-input" class="form-label">First Name</label>
            <input type="text" id="first-name-input" class="form-input" placeholder=" " />
          </div>

          <div class="form-group">
            <label for="last-name-input" class="form-label">Last Name</label>
            <input type="text" id="last-name-input" class="form-input" placeholder=" " />
          </div>

          <div class="form-group">
            <label for="user-name-input" class="form-label">User Name</label>
            <input type="text" id="user-name-input" class="form-input" placeholder=" " />
          </div>

          <div class="form-group">
            <label for="email-input" class="form-label">Email</label>
            <input type="email" id="email-input" class="form-input" placeholder=" " />
          </div>

          <div class="form-group">
            <label for="phone-number-input" class="form-label">Phone Number</label>
            <input type="tel" id="phone-number-input" class="form-input" placeholder=" " />
          </div>

          <div class="form-group">
            <label for="birth-date-input" class="form-label">Birth</label>
            <input type="date" id="birth-date-input" class="form-input" placeholder=" " />
          </div>

          <div class="form-group">
            <label for="gender-select" class="form-label">Gender</label>
            <select id="gender-select" class="form-input">
              <option value="" disabled selected></option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>

          <button type="submit" class="create-account-button"><a href="profile.html" style="color:#fff">Create Account</a></button>
        </form>
      </div>


      <footer class="footer">

        </div>

        <div class="footer-section footer-links">

            <li><a href="#" class="footer-link">Returns</a></li>

          </ul>
        </div>

        <div class="footer-section footer-newsletter">
          <span class="footer-heading">Newsletter</span>
          <input type="email" class="newsletter-input" placeholder="Enter Your Email Address" />
          <button type="submit" class="newsletter-subscribe-button">Subscribe</button>
        </div>

        <div class="footer-copyright">
          <span>2025 All rights reserved</span>
        </div>
      </footer>
